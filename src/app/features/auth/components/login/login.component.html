<div class="auth-container">
  <div class="auth-card card-glass">
    <div class="auth-header">
      <div class="logo">
        <i class="pi pi-users"></i>
      </div>
      <h2>Workforce Portal</h2>
      <p>Log in to access your dashboard</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="form-grid full-width-fields">
      @if (errorMessage()) {
        <p-message severity="error" [text]="errorMessage()!" styleClass="w-full"></p-message>
      }

      <div class="field-group">
        <label for="username">Username</label>
        <span class="p-input-icon-left">
          <i class="pi pi-user"></i>
          <input
            pInputText
            id="username"
            formControlName="username"
            placeholder="Enter your username"
            [class.ng-invalid]="
              loginForm.get('username')?.touched && loginForm.get('username')?.invalid
            "
            [class.ng-dirty]="loginForm.get('username')?.touched"
          />
        </span>
        <app-field-error [control]="loginForm.controls.username" />
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <span class="p-input-icon-left">
          <i class="pi pi-lock"></i>
          <input
            pInputText
            type="password"
            id="password"
            formControlName="password"
            placeholder="Enter your password"
            [class.ng-invalid]="
              loginForm.get('password')?.touched && loginForm.get('password')?.invalid
            "
            [class.ng-dirty]="loginForm.get('password')?.touched"
          />
        </span>
        <app-field-error [control]="loginForm.controls.username" />
      </div>

      <div class="form-actions-full">
        <button
          pButton
          type="submit"
          label="Log In"
          icon="pi pi-sign-in"
          [appLoading]="isLoading()"
          class="w-full p-button-primary"
        ></button>
      </div>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/auth/register">Create one here</a></p>
    </div>
  </div>
</div>
